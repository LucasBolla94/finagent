version: "3.9"

services:

  # ─────────────────────────────────────
  # PostgreSQL + pgvector
  # ─────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: finagent_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-finagent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finagent}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────
  # Redis
  # ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: finagent_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────
  # Backend (FastAPI)
  # ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finagent_backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    command: >
      bash -c "
        echo '⏳ Running Alembic migrations...' &&
        alembic upgrade head &&
        echo '✅ Migrations done. Starting server...' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  # ─────────────────────────────────────
  # Celery Worker (async tasks)
  # ─────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finagent_celery_worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4

  # ─────────────────────────────────────
  # Celery Beat (scheduled tasks)
  # Checks alerts hourly, weekly summaries, etc.
  # ─────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finagent_celery_beat
    restart: unless-stopped
    env_file: .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    command: celery -A app.workers.celery_app beat --loglevel=info

  # ─────────────────────────────────────
  # Frontend (Next.js)
  # ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finagent_frontend
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}

  # ─────────────────────────────────────
  # Evolution API (WhatsApp)
  # ─────────────────────────────────────
  evolution_api:
    image: atendai/evolution-api:latest
    container_name: finagent_evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: ${EVOLUTION_API_URL:-http://localhost:8080}
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-changeme}
      DATABASE_ENABLED: "true"
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER:-finagent}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-finagent}
      REDIS_ENABLED: "true"
      REDIS_URI: redis://redis:6379/3
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_URL: http://backend:8000/api/v1/webhooks/whatsapp
    depends_on:
      - postgres
      - redis
    volumes:
      - evolution_data:/evolution/instances

  # ─────────────────────────────────────
  # Nginx (reverse proxy)
  # ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: finagent_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./docker/ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - frontend


volumes:
  postgres_data:
  redis_data:
  uploads_data:
  evolution_data:
