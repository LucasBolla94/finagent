version: "3.9"

services:

  # ─────────────────────────────────────
  # PostgreSQL + pgvector
  # ─────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: finagent_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-finagent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finagent}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────
  # Redis
  # ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: finagent_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────
  # Backend (FastAPI)
  # ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finagent_backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    command: >
      bash -c "
        echo '⏳ Running Alembic migrations...' &&
        alembic upgrade head &&
        echo '✅ Migrations done. Starting server...' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
      "

  # ─────────────────────────────────────
  # Celery Worker (async tasks)
  # ─────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finagent_celery_worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4

  # ─────────────────────────────────────
  # Celery Beat (scheduled tasks)
  # Checks alerts hourly, weekly summaries, etc.
  # ─────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finagent_celery_beat
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    # BUG-001 FIX: this project uses FastAPI/SQLAlchemy, NOT Django.
    # django_celery_beat does not exist in requirements.txt → ModuleNotFoundError.
    command: celery -A app.workers.celery_app beat --loglevel=info

  # ─────────────────────────────────────
  # Frontend (Next.js)
  # IMPORTANT: NEXT_PUBLIC_* vars are baked into the JS bundle at BUILD TIME.
  # They MUST be passed as build args — setting them only in environment: has
  # no effect for client-side code after the image is already built.
  # ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # This is the URL the browser uses to call the backend.
        # In production behind Nginx: same domain, e.g. https://finance.bolla.network
        # The arg is passed into the Next.js build so NEXT_PUBLIC_API_URL is correct
        # in the compiled JS bundle.
        NEXT_PUBLIC_API_URL: ${BACKEND_PUBLIC_URL:-https://finance.bolla.network}
    container_name: finagent_frontend
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    environment:
      # Runtime env vars (for SSR / server components only)
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${BACKEND_PUBLIC_URL:-https://finance.bolla.network}

  # ─────────────────────────────────────
  # Evolution API (WhatsApp)
  # ─────────────────────────────────────
  evolution_api:
    image: atendai/evolution-api:latest
    container_name: finagent_evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: ${BACKEND_PUBLIC_URL:-https://finance.bolla.network}

      # ── Authentication ─────────────────────────────────────────────────
      # REQUIRED in v2: without AUTHENTICATION_TYPE=apikey → 403 on all endpoints
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"

      # ── Database ───────────────────────────────────────────────────────
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      # Evolution API uses its OWN database to avoid Prisma migration conflicts
      # with FinAgent's SQLAlchemy schema. The database is created by init_postgres.sql.
      DATABASE_CONNECTION_URI: "postgresql://${POSTGRES_USER:-finagent}:${POSTGRES_PASSWORD}@postgres:5432/evolution_api"
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"

      # ── Cache ──────────────────────────────────────────────────────────
      # BUG-001 FIX: Evolution API v2.2.x + Baileys fails to generate QR code
      # when Redis cache and PostgreSQL are used simultaneously — Baileys enters
      # a reconnect loop and GET /instance/connect/{name} returns {count:0}.
      # Fix: disable Redis cache, use in-process local cache instead.
      # Redis is still used by FinAgent (Celery) on db 0/1/2 — only Evolution's
      # cache is switched to local to avoid the Baileys race condition.
      CACHE_REDIS_ENABLED: "false"
      CACHE_LOCAL_ENABLED: "true"

      # ── Webhook ────────────────────────────────────────────────────────
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_URL: http://backend:8000/api/v1/webhooks/whatsapp
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"

      # ── QR Code ────────────────────────────────────────────────────────
      QRCODE_LIMIT: "30"
      QRCODE_COLOR: "#198754"
      LANGUAGE: pt-BR

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - evolution_data:/evolution/instances

  # ─────────────────────────────────────
  # Nginx (reverse proxy)
  # ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: finagent_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./docker/ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - frontend


volumes:
  postgres_data:
  redis_data:
  uploads_data:
  evolution_data:
